# Local arXiv metadata service configuration.

db:
  path: "/Volumes/My Book/ARXIV/arxiv_oai_title_fts.sqlite"
  read:
    # immutable=1 is safe only when no writer is modifying the DB file.
    immutable: true
    # query_only prevents accidental writes from normal search/API paths.
    query_only: true
    # mmap_size is bytes; 268435456 = 256 MiB.
    mmap_size: 268435456
    # Negative cache_size means KiB; -80000 is about 80 MiB.
    cache_size: -80000

server:
  host: "127.0.0.1"
  port: 8110

data:
  jsonl: "/Volumes/My Book/ARXIV/arxiv-metadata-oai-snapshot.json"
