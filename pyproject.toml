[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arxiv-metadata-service"
version = "0.1.0"
description = "本地 arXiv 全量元数据检索服务 — Kaggle 数据 + SQLite FTS5 + FastAPI"
authors = [
    {name = "Li Shen"},
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"
keywords = ["arxiv", "metadata", "search", "fts5", "fastapi", "kaggle"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database :: Front-Ends",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "requests>=2.28",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pyright",
    "pytest>=7.0",
    "httpx>=0.27",
]
# 注意: kagglehub 用于下载数据集，但不是核心依赖
# 首次运行 "arxiv-meta download" 时会自动安装

[project.scripts]
arxiv-meta = "arxiv_meta.cli:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q --tb=short"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N"]
ignore = ["E501"]

[tool.setuptools.packages.find]
include = ["arxiv_meta*"]
